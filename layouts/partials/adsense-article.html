{{- if and site.Params.adsensePublisherId site.Params.adsenseSlotId }}
<!-- In-article Ad -->
<div class="adsense-article" style="margin: 2rem 0; text-align: center;">
  <ins class="adsbygoogle"
       style="display:block; text-align:center;"
       data-ad-layout="in-article"
       data-ad-format="fluid"
       data-ad-client="{{ site.Params.adsensePublisherId }}"
       data-ad-slot="{{ site.Params.adsenseSlotId }}"></ins>
  <script>
       (adsbygoogle = window.adsbygoogle || []).push({});
  </script>
</div>
{{- end }}
