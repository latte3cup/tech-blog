baseURL = "https://latte3cup.github.io/tech-blog/"
title = "Tech Blog"
languageCode = "ko"
defaultContentLanguage = "ko"
theme = "PaperMod"

# 빌드 설정
paginate = 10
enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false

# Sitemap
[sitemap]
  changefreq = "weekly"
  filename = "sitemap.xml"
  priority = 0.5

# SEO & 소셜 미디어
[params]
  env = "production"
  title = "Tech Blog"
  description = "기술, IT, 프로그래밍에 대한 블로그"
  keywords = ["기술", "IT", "프로그래밍", "개발", "tech", "blog"]
  author = "latte3cup"
  defaultTheme = "auto"  # auto = 시스템 설정 따름
  disableThemeToggle = false
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = false
  ShowRssButtonInSectionTermList = true
  UseHugoToc = true
  disableSpecial1stPost = false
  disableScrollToTop = false
  hidemeta = false
  hideSummary = false
  showtoc = true

  # AdSense (실제 ID로 교체 필요)
  # 사이트 승인 후 실제 pub-ID와 ad-slot으로 변경
  adsensePublisherId = "ca-pub-XXXXXXXXXXXXXXXX"
  adsenseSlotId = "XXXXXXXXXX"

  # Google Analytics 4 (실제 measurement ID로 교체 필요)
  googleAnalyticsId = "G-XXXXXXXXXX"

  # OG / Twitter 메타태그
  images = ["images/og-default.png"]

  [params.homeInfoParams]
    Title = "Tech Blog"
    Content = "기술, IT, 프로그래밍에 대한 이야기를 나눕니다."

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/latte3cup"

# 검색 기능
[outputs]
  home = ["HTML", "RSS", "JSON"]

# 메뉴
[menu]
  [[menu.main]]
    identifier = "posts"
    name = "Posts"
    url = "/posts/"
    weight = 10
  [[menu.main]]
    identifier = "search"
    name = "Search"
    url = "/search/"
    weight = 20
  [[menu.main]]
    identifier = "tags"
    name = "Tags"
    url = "/tags/"
    weight = 30

# 코드 하이라이팅
[markup]
  [markup.highlight]
    codeFences = true
    guessSyntax = true
    lineNos = false
    style = "monokai"
  [markup.goldmark.renderer]
    unsafe = true
